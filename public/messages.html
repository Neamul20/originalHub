<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Messages – OriginalHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="main-nav"></nav>
  <div class="container page-content">
    <h2 style="margin-bottom:1rem">Messages</h2>
    <div class="chat-layout">
      <div class="thread-list" id="thread-list">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>
      <div id="chat-main" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted)">
        Select a conversation to start chatting.
      </div>
    </div>
  </div>
  <footer id="main-footer"></footer>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/messaging.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.isLoggedIn()) { showAuthModal('login'); return; }
      initFromUrlParams();
    });
    window.addEventListener('beforeunload', () => {
      if (pollInterval) clearInterval(pollInterval);
    });
  </script>
</body>
</html>
