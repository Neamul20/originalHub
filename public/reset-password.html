<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password – OriginalHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="main-nav"></nav>
  <div class="container page-content" style="max-width:420px">
    <div class="card">
      <div class="card-header">Reset Password</div>
      <div class="card-body">
        <form onsubmit="resetPwd(event)">
          <div class="form-group">
            <label>New Password <span class="form-hint">(min 8 characters)</span></label>
            <input type="password" id="new-pwd" required minlength="8">
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirm-pwd" required minlength="8">
          </div>
          <div id="reset-msg" class="alert" style="display:none"></div>
          <button type="submit" class="btn btn-primary" style="width:100%">Reset Password</button>
        </form>
      </div>
    </div>
  </div>
  <footer id="main-footer"></footer>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
  <script>
    async function resetPwd(e) {
      e.preventDefault();
      const msgEl = document.getElementById('reset-msg');
      const pwd = document.getElementById('new-pwd').value;
      if (pwd !== document.getElementById('confirm-pwd').value) {
        msgEl.className = 'alert alert-danger'; msgEl.textContent = 'Passwords do not match'; msgEl.style.display = ''; return;
      }
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) { msgEl.className = 'alert alert-danger'; msgEl.textContent = 'Invalid link'; msgEl.style.display = ''; return; }
      try {
        await apiFetch('/auth/reset-password', { method:'POST', body:JSON.stringify({ token, password: pwd }) });
        msgEl.className = 'alert alert-success'; msgEl.textContent = 'Password reset! You can now login.'; msgEl.style.display = '';
        setTimeout(() => window.location.href = '/', 2000);
      } catch(err) {
        msgEl.className = 'alert alert-danger'; msgEl.textContent = err.message; msgEl.style.display = '';
      }
    }
  </script>
</body>
</html>
